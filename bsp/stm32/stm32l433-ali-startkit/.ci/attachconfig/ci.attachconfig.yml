scons.args: &scons
    scons_arg:
      - '--strict'

# ------ nano ------
nano:
  <<: *scons
  kconfig:
    - CONFIG_RT_USING_NANO=y

devices.soft_i2c:
  <<: *scons
  kconfig:
    - CONFIG_RT_USING_I2C=y
    - CONFIG_RT_USING_SOFT_I2C=y
    - CONFIG_RT_USING_SOFT_I2C2=y
    - CONFIG_RT_SOFT_I2C2_SCL_PIN=29
    - CONFIG_RT_SOFT_I2C2_SDA_PIN=30
    - CONFIG_RT_SOFT_I2C2_BUS_NAME="swi2c2"
    - CONFIG_RT_USING_SOFT_I2C3=y
    - CONFIG_RT_SOFT_I2C3_SCL_PIN=32
    - CONFIG_RT_SOFT_I2C3_SDA_PIN=33
    - CONFIG_RT_SOFT_I2C3_BUS_NAME="swi2c3"
    - CONFIG_RT_USING_SOFT_I2C4=y
    - CONFIG_RT_SOFT_I2C4_SCL_PIN=60
    - CONFIG_RT_SOFT_I2C4_SDA_PIN=61
    - CONFIG_RT_SOFT_I2C4_BUS_NAME="swi2c4"
