     class="box-title"
     x="1060"
     y="410"
     text-anchor="middle"
     id="text39">main_thread_entry</text>
  <text
     class="box-file"
     x="1060"
     y="434"
     text-anchor="middle"
     id="text40">Before user main()</text>
  <text
     class="box-note"
     x="1060"
     y="456"
     text-anchor="middle"
     id="text41">Wake the remaining CPUs before</text>
